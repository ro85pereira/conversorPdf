<!DOCTYPE html>
<html lang="pt-BR">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZippyDocs - Converter Arquivos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
  <!-- Barra de navegação -->
  <nav class="menu">
    <ul>
       <li><a href="INDEX.HTML">HOME</a></li>
       <li><a href="unificar.html">UNIFICAR</a></li>
       <li><a href="dividir.html">DIVIDIR PDF</a></li>
       <li><a href="comprimir.html">COMPRIMIR PDF</a></li>
       <li><a href="converter.html">CONVERTER</a></li>
       <li class="menu-icon"><img src="íCONE/zippy.ico"></li>
    </ul>
  </nav>

  <!-- Cabeçalho -->
  <header>
    <h1>Converter seus arquivos com facilidade com o ZippyDocs</h1>
  </header>

  <main class="grid-container-sub-pages">
    <!-- Card inicial -->
    <div class="tool-card">
      <img src="íCONE/documentos-google.ico" id="pages">
      <h2>CONVERTER ARQUIVOS</h2>
      <p>Selecione um arquivo e escolha para qual formato deseja converter.</p>
      <input type="file" id="seletor-arquivo" style="display: none;">
      <button onclick="document.getElementById('seletor-arquivo').click()">SELECIONE SEU ARQUIVO</button>
    </div>
    
    <!-- Área que aparece após selecionar -->
    <div id="area-arquivos" style="display: none;">
      <h3>Arquivo selecionado:</h3>
      <ul id="lista-arquivo"></ul>

      <h3>Escolha o formato de conversão:</h3>
      <select id="opcoes-conversao"></select>

      <button id="botao-enviar">Enviar para conversão</button>
    </div>
  </main>

  <script>
    const inputArquivo = document.getElementById('seletor-arquivo');
    const lista = document.getElementById('lista-arquivo');
    const areaArquivos = document.getElementById('area-arquivos');
    const botaoEnviar = document.getElementById('botao-enviar');
    const selectOpcoes = document.getElementById('opcoes-conversao');

    let arquivoSelecionado = null;
    let tipoArquivo = null;

    // Quando a página carrega, limpa tudo
    window.addEventListener("load", () => {
      arquivoSelecionado = null;
      lista.innerHTML = "";
      areaArquivos.style.display = "none";
    });

    // Ao selecionar arquivo
    inputArquivo.addEventListener('change', () => {
      arquivoSelecionado = inputArquivo.files[0];
      lista.innerHTML = "";
      selectOpcoes.innerHTML = "";

      if (arquivoSelecionado) {
        const item = document.createElement('li');
        const nome = arquivoSelecionado.name;
        const tamanho = (arquivoSelecionado.size / 1024).toFixed(2) + " KB";
        item.innerHTML = `
          <span class="nome">${nome}</span>
          <span class="tamanho">${tamanho}</span>`;
        lista.appendChild(item);

        // Detecta tipo do arquivo pela extensão
        const extensao = nome.split('.').pop().toLowerCase();
        tipoArquivo = extensao;

        // Define opções possíveis
        let opcoes = [];
        if (extensao === "pdf") {
          opcoes = ["Word (.docx)", "Imagem PNG (.png)", "Excel (.xlsx)"];
        } else if (extensao === "png") {
          opcoes = ["JPEG (.jpeg)", "JPG (.jpg)", "PDF (.pdf)"];
        } else {
          opcoes = ["Formato não suportado"];
        }

        // Preenche select
        opcoes.forEach(opcao => {
          const opt = document.createElement("option");
          opt.value = opcao;
          opt.textContent = opcao;
          selectOpcoes.appendChild(opt);
        });

        // Exibe área de arquivos
        areaArquivos.style.display = "block";
      }
    });

    // Função para enviar ao backend
    async function enviarArquivo() {
      if (!arquivoSelecionado) {
        alert("Selecione um arquivo primeiro!");
        return;
      }

      const formatoDestino = selectOpcoes.value;
      if (!formatoDestino || formatoDestino.includes("não suportado")) {
        alert("Selecione um formato válido!");
        return;
      }

      const formData = new FormData();
      formData.append("file", arquivoSelecionado);
      formData.append("tipo_origem", tipoArquivo);
      formData.append("tipo_destino", formatoDestino);

      try {
        const resposta = await fetch("/converter", {
          method: "POST",
          body: formData
        });

        if (resposta.ok) {
          const blob = await resposta.blob();
          const url = window.URL.createObjectURL(blob);

          const linkDownload = document.createElement("a");
          linkDownload.href = url;
          linkDownload.download = "convertido." + formatoDestino.split(".").pop();
          linkDownload.textContent = "Clique aqui para baixar o arquivo convertido";

          areaArquivos.appendChild(linkDownload);
        } else {
          alert("Erro ao converter arquivo: " + resposta.statusText);
        }
      } catch (erro) {
        console.error("Erro:", erro);
        alert("Falha na conexão com o servidor.");
      }
    }

    botaoEnviar.onclick = enviarArquivo;
  </script>
</body>
</html>
